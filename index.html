<!DOCTYPE html>
<html>
  <head>
    <title>ポートフォリオ</title>
    <link rel="stylesheet" href="style.css"/>
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>ポートフォリオを作成いたしました。</h1>
    <p>これから猫を紹介するWebアプリを作成いたします。</p>
    <p>楽しみにしててください</p>
    <p>下記登録フォームにてご連絡ください。</p>

    <form id = "contact-form" action="https://formspree.io/f/mzzvdeee" method="POST">
      <label>名前</label>
      <input type="text" name="name" required>
      <label>メールアドレス：</label>
      <input type="text" name="email" required>
      <label>メッセージ</label>
      <textarea name="message" required></textarea>

      <button type="submit">送信</button>

      <p id="confirmation" style = "display: none;">送信が完了しました！</p>
    </form>
  </body>
</html>
